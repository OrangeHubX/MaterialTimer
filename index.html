<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Material Timer</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f5faf0" id="meta-theme-color">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Roboto+Mono:wght@300;400&display=swap">
  <style>
    /* Material 3 Tonal Palette */
    :root {
      --p:   #4c8346; /* Primary */
      --op:  #ffffff; /* On Primary */
      --pc:  #cdf5be; /* Primary Container */
      --opc: #072100; /* On Primary Container */
      --bg:  #fdfdf9; /* Surface */
      --obg: #1a1c18; /* On Surface */
      --sc:  #f0f3eb; /* Surface Container */
      --sch: #e8ebe3; /* Surface Container High */
      --sv:  #dfe4d7; /* Surface Variant */
      --osv: #43483f; /* On Surface Variant */
      --ol:  #73796e; /* Outline */
      --olv: #c3c8bc; /* Outline Variant */
      --trans-curve: cubic-bezier(0.2, 0, 0, 1);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --p:   hsl(120,40%,78%);
        --op:  hsl(120,40%,10%);
        --pc:  hsl(120,40%,24%);
        --opc: hsl(120,40%,90%);
        --bg:  hsl(120,10%,6%);
        --obg: hsl(120,8%,88%);
        --sc:  hsl(120,10%,9%);
        --sch: hsl(120,10%,14%);
        --sv:  hsl(120,10%,17%);
        --osv: hsl(120,7%,70%);
        --ol:  hsl(120,7%,54%);
        --olv: hsl(120,8%,25%);
      }
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden}

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--obg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background .4s var(--trans-curve), color .4s var(--trans-curve);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      position: relative;
    }

    /* Power Save Mode */
    body.ps-active {
      background: #000000;
      color: #000000;
    }
    body.ps-active #top-bar, body.ps-active #controls, body.ps-active #dur-row, 
    body.ps-active #sessions, body.ps-active #stopwatch-anim, body.ps-active #mode-chip, 
    body.ps-active #progress, body.ps-active #custom-hint {
      opacity: 0 !important;
      pointer-events: none;
    }
    body.ps-active #timer {
      color: #666666; /* Dimmed text for OLED */
      transform: scale(0.85);
    }

    #progress {
      position: fixed; inset: auto 0 0; height: 0%;
      background: var(--pc); border-radius: 28px 28px 0 0;
      transition: height 1.05s linear, background .4s var(--trans-curve);
      z-index: 0;
    }

    #top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; z-index: 10; transition: opacity .4s var(--trans-curve);
    }

    #mode-tabs {
      display: flex; background: var(--sc); border-radius: 24px; padding: 4px; gap: 4px;
    }
    
    .mtbtn {
      width: 48px; height: 40px; border-radius: 20px; border: none;
      background: transparent; color: var(--osv); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .3s var(--trans-curve), color .3s var(--trans-curve);
    }
    .mtbtn.active { background: var(--pc); color: var(--opc); font-variation-settings: 'FILL' 1; }
    .mtbtn .material-symbols-rounded { font-size: 20px; }

    .tb-right { display: flex; gap: 4px; }

    #main {
      position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center;
      transition: transform .4s var(--trans-curve);
    }

    #mode-chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 16px; border-radius: 8px;
      background: var(--sc); color: var(--obg);
      font-size: 11px; font-weight: 500; letter-spacing: 1.3px; text-transform: uppercase;
      margin-bottom: 20px; transition: background .4s var(--trans-curve), color .4s var(--trans-curve);
    }
    #mode-chip.editable { cursor: pointer; }
    #mode-chip.editable:active { transform: scale(0.95); }

    .mode-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--p);
      transition: background .4s var(--trans-curve); flex-shrink: 0;
    }
    .mode-dot.running { animation: pulse-dot 1.8s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.4; transform:scale(1.6); } }

    #sessions, #stopwatch-anim { display: flex; gap: 10px; margin-bottom: 26px; height: 8px; }
    #stopwatch-anim { display: none; }

    .sdot, .sw-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--sv);
      transition: background .3s var(--trans-curve), transform .3s var(--trans-curve);
    }
    .sdot.done { background: var(--p); }
    .sdot.current { background: var(--p); transform: scale(1.45); }

    .sw-dot.running { background: var(--p); animation: pulse-sw 1s infinite alternate; }
    .sw-dot:nth-child(2) { animation-delay: 0.3s; }
    .sw-dot:nth-child(3) { animation-delay: 0.6s; }
    @keyframes pulse-sw { 0% { transform: translateY(0); } 100% { transform: translateY(-8px); } }

    #timer {
      font-family: 'Roboto Mono', monospace; font-weight: 300;
      font-size: clamp(4.5rem, 22vw, 9.5rem); line-height: 1; letter-spacing: -.03em;
      color: var(--obg); margin-bottom: 14px;
      transition: color .4s var(--trans-curve), font-size .5s var(--trans-curve), transform .2s var(--trans-curve);
    }
    #timer.clickable { cursor: pointer; }
    #timer.clickable:active { transform: scale(0.95); }
    body.fs #timer { font-size: clamp(7rem, 30vw, 15rem); }

    #custom-hint {
      font-size: 11px; color: var(--osv); font-weight: 500;
      text-transform: uppercase; letter-spacing: 1.2px; margin-top: -10px; margin-bottom: 44px; display: none;
    }

    #dur-row {
      display: flex; align-items: center; gap: 16px; margin-bottom: 44px;
      transition: opacity .3s var(--trans-curve), transform .3s var(--trans-curve);
    }
    #dur-row.hidden { opacity: 0; pointer-events: none; transform: translateY(-5px); }

    #dur-label { font-size: 14px; font-weight: 500; color: var(--obg); min-width: 48px; text-align: center; }

    .dur-btn {
      width: 40px; height: 40px; border-radius: 20px; border: none;
      background: var(--sc); color: var(--obg); cursor: pointer;
      display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
    }
    .dur-btn .material-symbols-rounded { font-size: 20px; }

    #controls { display: flex; align-items: center; gap: 24px; transition: opacity .3s var(--trans-curve); }

    #fab {
      width: 88px; height: 88px; border-radius: 24px; border: none;
      background: var(--pc); color: var(--opc); cursor: pointer;
      display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,.08); transition: background .4s var(--trans-curve), transform .2s var(--trans-curve);
    }
    #fab:active { transform: scale(.92); }
    #fab .material-symbols-rounded { font-size: 40px; font-variation-settings: 'FILL' 1; }

    .ibtn, .tbtn {
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; transition: background .4s var(--trans-curve), color .4s var(--trans-curve);
    }
    .ibtn { width: 56px; height: 56px; border-radius: 28px; background: var(--sc); color: var(--obg); }
    .tbtn { width: 44px; height: 44px; border-radius: 22px; background: transparent; color: var(--osv); }
    .ibtn .material-symbols-rounded { font-size: 24px; }
    .tbtn .material-symbols-rounded { font-size: 22px; }

    .ripple {
      position: absolute; border-radius: 50%; transform: scale(0);
      animation: ripple-out .55s var(--trans-curve) forwards; pointer-events: none;
    }
    #fab .ripple { background: rgba(0,0,0,.1); }
    .ibtn .ripple, .dur-btn .ripple, .tbtn .ripple, .preset .ripple, .kbtn .ripple { background: rgba(0,0,0,.08); }
    @keyframes ripple-out { to { transform:scale(4); opacity:0; } }

    /* Smart Fullscreen: only hides when playing */
    body.fs #top-bar, body.fs #controls, body.fs #dur-row, body.fs #custom-hint,
    body.fs #mode-chip, body.fs #sessions, body.fs #stopwatch-anim { opacity:0; pointer-events:none; }

    body.fs.cv #top-bar, body.fs.cv #controls, body.fs.cv #mode-chip,
    body.fs.cv #sessions, body.fs.cv #stopwatch-anim { opacity:1; pointer-events:auto; }
    body.fs.cv #dur-row:not(.hidden), body.fs.cv #custom-hint:not([style*="none"]) { opacity:1; pointer-events:auto; }

    /* Modals & Dialogs */
    .scrim {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 98; opacity: 0; pointer-events: none; transition: opacity .3s var(--trans-curve);
    }
    .scrim.open { opacity: 1; pointer-events: auto; }

    .bottom-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--sc); border-radius: 28px 28px 0 0;
      padding: 16px 24px 44px; z-index: 99;
      transform: translateY(100%); transition: transform .4s var(--trans-curve), background .4s var(--trans-curve);
    }
    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 32px; height: 4px; background: var(--olv);
      border-radius: 2px; margin: 0 auto 24px;
    }

    .bottom-sheet h3 { font-size:16px; font-weight:500; color:var(--obg); margin-bottom:16px; }

    /* Settings Menu */
    .setting-group { margin-bottom: 24px; }
    .setting-group label { display: block; font-size: 13px; color: var(--osv); margin-bottom: 12px; font-weight: 500; }
    
    #presets { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
    .preset {
      width: 44px; height: 44px; border-radius: 22px; border: 3px solid transparent;
      cursor: pointer; position: relative; overflow: hidden; transition: transform .2s, border-color .2s; outline: none;
    }
    .preset.sel { border-color: var(--obg); transform: scale(1.1); }

    .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
    .setting-row span { font-size: 16px; color: var(--obg); }
    
    .toggle-switch {
      appearance: none; width: 52px; height: 32px; background: var(--sv);
      border-radius: 16px; position: relative; cursor: pointer; outline: none;
      transition: background .3s;
    }
    .toggle-switch::after {
      content: ''; position: absolute; top: 4px; left: 4px; width: 24px; height: 24px;
      background: var(--osv); border-radius: 50%; transition: transform .3s var(--trans-curve), background .3s;
    }
    .toggle-switch:checked { background: var(--p); }
    .toggle-switch:checked::after { transform: translateX(20px); background: var(--op); }

    .num-input {
      background: var(--sch); border: none; color: var(--obg); font-family: 'Roboto Mono', monospace;
      font-size: 16px; padding: 8px 12px; border-radius: 8px; width: 80px; text-align: center;
    }

    /* Dialog */
    #warning-dialog {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
      background: var(--sch); border-radius: 28px; padding: 24px; width: 90%; max-width: 320px;
      z-index: 100; opacity: 0; pointer-events: none; transition: transform .3s var(--trans-curve), opacity .3s;
    }
    #warning-dialog.open { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
    #warning-dialog h3 { font-size: 24px; font-weight: 400; color: var(--obg); margin-bottom: 16px; }
    #warning-dialog p { font-size: 14px; color: var(--osv); margin-bottom: 24px; line-height: 1.5; }
    .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .dialog-btn {
      background: transparent; color: var(--p); border: none; font-size: 14px; font-weight: 500;
      padding: 10px 24px; border-radius: 20px; cursor: pointer; transition: background .2s;
    }
    .dialog-btn:hover { background: rgba(0,0,0,0.05); }

    /* Keypad */
    #keypad-sheet { display: flex; flex-direction: column; align-items: center; }
    #keypad-display {
      font-family: 'Roboto Mono', monospace; font-size: clamp(32px, 8vw, 42px); color: var(--obg);
      margin-bottom: 24px; letter-spacing: 1px; transition: transform .15s var(--trans-curve);
    }
    #keypad-display.pop { animation: key-pop .2s var(--trans-curve); }
    @keyframes key-pop { 0% { transform: scale(0.95); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
    
    .keypad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 320px; }
    .kbtn {
      background: var(--sch); color: var(--obg); border: none; height: 60px; border-radius: 30px;
      font-size: 24px; font-family: 'Roboto Mono', monospace; cursor: pointer;
      display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
      transition: background .2s, transform .1s;
    }
    .kbtn:active { transform: scale(0.92); background: var(--pc); color: var(--opc); }
    .keypad-actions { display: flex; gap: 16px; width: 100%; max-width: 320px; margin-top: 24px; }
    .keypad-actions button { flex: 1; height: 52px; border-radius: 26px; border: none; font-size: 16px; font-weight: 500; cursor: pointer; }
    #keypad-cancel { background: transparent; color: var(--osv); }
    #keypad-start { background: var(--p); color: var(--op); }

    /* Alarm Overlay */
    #alarm-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center;
      z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.4s var(--trans-curve);
    }
    #alarm-overlay.open { opacity: 1; pointer-events: auto; }
    .alarm-card {
      background: var(--sch); padding: 40px; border-radius: 32px; text-align: center; color: var(--obg);
      transform: scale(0.9); transition: transform 0.4s var(--trans-curve);
    }
    #alarm-overlay.open .alarm-card { transform: scale(1); }
    .alarm-card .material-symbols-rounded { font-size: 48px; color: var(--p); font-variation-settings: 'FILL' 1; }
    .alarm-title { font-size: 24px; margin: 16px 0 32px; font-weight: 500; }
    #stop-alarm-btn { background: var(--pc); color: var(--opc); border: none; padding: 18px 36px; border-radius: 24px; font-size: 16px; font-weight: 500; cursor: pointer; }

    @media (max-height: 550px) {
      #top-bar { padding: 4px 12px; }
      #mode-chip { margin-bottom: 8px; padding: 4px 12px; }
      #sessions, #stopwatch-anim { margin-bottom: 8px; }
      #timer { margin-bottom: 6px; font-size: clamp(3rem, 25vh, 6rem); }
      #dur-row, #custom-hint { margin-bottom: 12px; }
      #controls { gap: 16px; }
      #fab { width: 64px; height: 64px; border-radius: 20px; }
      #fab .material-symbols-rounded { font-size: 32px; }
      .ibtn { width: 48px; height: 48px; border-radius: 24px; }
    }

    #bgv { position:fixed; width:1px; height:1px; opacity:0; pointer-events:none; }
  </style>
</head>
<body>

  <div id="top-bar">
    <div id="mode-tabs">
      <button class="mtbtn active" data-mode="pomodoro"><span class="material-symbols-rounded">timer</span></button>
      <button class="mtbtn" data-mode="custom"><span class="material-symbols-rounded">hourglass_empty</span></button>
      <button class="mtbtn" data-mode="stopwatch"><span class="material-symbols-rounded">timer_10_alt_1</span></button>
    </div>
    <div class="tb-right">
      <button class="tbtn" id="fs-btn"><span class="material-symbols-rounded">fullscreen</span></button>
      <button class="tbtn" id="settings-btn"><span class="material-symbols-rounded">settings</span></button>
    </div>
  </div>

  <div id="progress"></div>

  <div id="main">
    <div id="mode-chip">
      <span class="mode-dot" id="mode-dot"></span>
      <span id="mode-text">Focus</span>
    </div>

    <div id="sessions">
      <span class="sdot" data-i="0"></span>
      <span class="sdot" data-i="1"></span>
      <span class="sdot" data-i="2"></span>
      <span class="sdot" data-i="3"></span>
    </div>
    
    <div id="stopwatch-anim">
      <div class="sw-dot"></div><div class="sw-dot"></div><div class="sw-dot"></div>
    </div>

    <div id="timer">25:00</div>
    <div id="custom-hint">Tap time to edit</div>

    <div id="dur-row">
      <button class="dur-btn" id="dec-btn"><span class="material-symbols-rounded">remove</span></button>
      <span id="dur-label">25 min</span>
      <button class="dur-btn" id="inc-btn"><span class="material-symbols-rounded">add</span></button>
    </div>

    <div id="controls">
      <button class="ibtn" id="reset-btn"><span class="material-symbols-rounded">replay</span></button>
      <button id="fab"><span class="material-symbols-rounded" id="fab-icon">play_arrow</span></button>
      <button class="ibtn" id="skip-btn"><span class="material-symbols-rounded">skip_next</span></button>
    </div>
  </div>

  <div class="scrim" id="main-scrim"></div>
  
  <div id="settings-sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <h3>Settings</h3>
    
    <div class="setting-group">
      <label>Theme Palette</label>
      <div id="presets"></div>
    </div>

    <div class="setting-group">
      <div class="setting-row">
        <span>Dark Mode</span>
        <input type="checkbox" id="theme-toggle" class="toggle-switch">
      </div>
    </div>

    <div class="setting-group">
      <label>Power Save Mode (OLED Blackout)</label>
      <div class="setting-row">
        <span>Enable</span>
        <input type="checkbox" id="ps-toggle" class="toggle-switch">
      </div>
      <div class="setting-row" style="margin-top: 12px;">
        <span>Idle timeout (minutes)</span>
        <input type="number" id="ps-time" class="num-input" value="5" min="1">
      </div>
    </div>
  </div>

  <div id="keypad-sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div id="keypad-display">00h 00m 00s</div>
    <div class="keypad-grid">
      <button class="kbtn">1</button><button class="kbtn">2</button><button class="kbtn">3</button>
      <button class="kbtn">4</button><button class="kbtn">5</button><button class="kbtn">6</button>
      <button class="kbtn">7</button><button class="kbtn">8</button><button class="kbtn">9</button>
      <button class="kbtn">00</button><button class="kbtn">0</button>
      <button class="kbtn" id="kbtn-back"><span class="material-symbols-rounded">backspace</span></button>
    </div>
    <div class="keypad-actions">
      <button id="keypad-cancel">Cancel</button>
      <button id="keypad-start">Set Timer</button>
    </div>
  </div>

  <div id="warning-dialog">
    <h3>Switch Mode?</h3>
    <p>Your current timer will be cancelled and reset to zero.</p>
    <div class="dialog-actions">
      <button class="dialog-btn" id="dlg-cancel">Cancel</button>
      <button class="dialog-btn" id="dlg-confirm">Switch</button>
    </div>
  </div>

  <div id="alarm-overlay">
    <div class="alarm-card">
      <span class="material-symbols-rounded">notifications_active</span>
      <div class="alarm-title">Time's up!</div>
      <button id="stop-alarm-btn">Stop</button>
    </div>
  </div>

  <audio id="alarm-audio" src="timer_tone.mp3" loop preload="auto"></audio>
  <video id="bgv" loop muted playsinline><source src="blank-0.2-sec.m4v" type="video/mp4"></video>

  <script>
    const FOCUS_DEFAULT = 25 * 60, BREAK_SHORT = 5 * 60, BREAK_LONG = 15 * 60, LONG_EVERY = 4;
    const PRESET_COLORS = [
      { hex: '#4c8346' }, { hex: '#1a6ca8' }, { hex: '#b5264c' }, 
      { hex: '#6750a4' }, { hex: '#b25e02' }, { hex: '#006b5f' }
    ];

    let appMode = 'pomodoro', pendingMode = null;
    let focusDur = FOCUS_DEFAULT, customDur = 5 * 60, swTime = 0;
    let isRunning = false, isBreak = false, sessions = 0, remaining = focusDur;
    let ticker = null, seedHex = localStorage.getItem('seed') || '#4c8346';
    let cvTimer = null, keypadVal = "", customName = "Custom Timer";
    
    // Power Save Variables
    let psTimer = null;
    let psActive = false;
    let psEnabled = localStorage.getItem('psEnabled') === 'true';
    let psMinutes = parseInt(localStorage.getItem('psMinutes')) || 5;

    const els = {
      timer: document.getElementById('timer'), prog: document.getElementById('progress'),
      modeText: document.getElementById('mode-text'), modeDot: document.getElementById('mode-dot'),
      fabIcon: document.getElementById('fab-icon'), durLabel: document.getElementById('dur-label'),
      durRow: document.getElementById('dur-row'), hint: document.getElementById('custom-hint'),
      sess: document.getElementById('sessions'), swAnim: document.getElementById('stopwatch-anim'),
      modeChip: document.getElementById('mode-chip'), scrim: document.getElementById('main-scrim'),
      settingsSheet: document.getElementById('settings-sheet'), keypadSheet: document.getElementById('keypad-sheet'),
      keypadDisp: document.getElementById('keypad-display'), bgv: document.getElementById('bgv'),
      alarmAud: document.getElementById('alarm-audio'), alarmOverlay: document.getElementById('alarm-overlay'),
      dlg: document.getElementById('warning-dialog'), metaTheme: document.getElementById('meta-theme-color'),
      psToggle: document.getElementById('ps-toggle'), psTime: document.getElementById('ps-time'),
      themeToggle: document.getElementById('theme-toggle')
    };

    if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{})); }

    const fmt = s => {
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
      return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    };

    function totalTime() { return !isBreak ? focusDur : (sessions % LONG_EVERY === 0 ? BREAK_LONG : BREAK_SHORT); }
    function snapProgress() { els.prog.style.transition = 'none'; els.prog.style.height = '0%'; requestAnimationFrame(() => requestAnimationFrame(() => els.prog.style.transition = '')); }

    function updateDisplay() {
      const t = fmt(appMode === 'stopwatch' ? swTime : remaining);
      els.timer.textContent = t; document.title = `${t} — Timer`;
      if (appMode === 'custom') els.prog.style.height = customDur > 0 ? `${((customDur-remaining)/customDur)*100}%` : '0%';
      else if (appMode === 'pomodoro') {
        els.prog.style.height = `${((totalTime()-remaining)/totalTime())*100}%`;
        els.durLabel.textContent = `${focusDur/60} min`;
      } else els.prog.style.height = '0%';
    }

    function updateMode() {
      if (appMode === 'pomodoro') els.modeText.textContent = !isBreak ? 'Focus' : (sessions % LONG_EVERY === 0 ? 'Long Break' : 'Short Break');
      else if (appMode === 'custom') {
        els.modeText.textContent = customName;
        els.modeText.style.fontSize = customName !== "Custom Timer" ? "14px" : "11px";
      }
    }

    function updateSessionDots() {
      const cur = sessions % LONG_EVERY;
      document.querySelectorAll('.sdot').forEach((d, i) => {
        d.classList.remove('done','current');
        if (i < cur) d.classList.add('done'); else if (i === cur && !isBreak) d.classList.add('current');
      });
    }

    function stopAlarm() { els.alarmAud.pause(); els.alarmAud.currentTime = 0; els.alarmOverlay.classList.remove('open'); }

    function start() {
      if (isRunning) return;
      if (appMode === 'custom' && customDur === 0) { openKeypad(); return; }
      isRunning = true; els.fabIcon.textContent = 'pause'; els.modeDot.classList.add('running');
      if (appMode === 'pomodoro') els.durRow.classList.add('hidden');
      if (appMode === 'stopwatch') document.querySelectorAll('.sw-dot').forEach(d => d.classList.add('running'));
      els.bgv.play().catch(()=>{}); updateFSUI(); resetIdle();

      ticker = setInterval(() => {
        if (appMode === 'stopwatch') { swTime++; updateDisplay(); }
        else {
          remaining--; updateDisplay();
          if (remaining <= 0) {
            clearInterval(ticker); isRunning = false; els.fabIcon.textContent = 'play_arrow';
            els.modeDot.classList.remove('running'); els.bgv.pause();
            els.timer.classList.add('done'); setTimeout(() => els.timer.classList.remove('done'), 600);
            
            els.alarmAud.currentTime = 0; els.alarmAud.play().catch(()=>{}); els.alarmOverlay.classList.add('open'); wakeUp();

            if (appMode === 'pomodoro') {
              els.durRow.classList.remove('hidden');
              if (!isBreak) { sessions++; updateSessionDots(); }
              isBreak = !isBreak; remaining = totalTime(); updateMode();
            } else if (appMode === 'custom') remaining = customDur;
            snapProgress(); requestAnimationFrame(() => requestAnimationFrame(updateDisplay)); updateFSUI();
          }
        }
      }, 1000);
    }

    function pause() {
      clearInterval(ticker); isRunning = false; els.fabIcon.textContent = 'play_arrow';
      els.modeDot.classList.remove('running'); document.querySelectorAll('.sw-dot').forEach(d => d.classList.remove('running'));
      if (appMode === 'pomodoro') els.durRow.classList.remove('hidden'); els.bgv.pause(); updateFSUI();
    }

    function toggle() { isRunning ? pause() : start(); }

    function reset() {
      pause(); stopAlarm();
      if (appMode === 'pomodoro') { isBreak = false; sessions = 0; remaining = focusDur; updateMode(); updateSessionDots(); }
      else if (appMode === 'custom') remaining = customDur;
      else if (appMode === 'stopwatch') swTime = 0;
      snapProgress(); requestAnimationFrame(() => requestAnimationFrame(updateDisplay));
    }

    function skip() {
      if (appMode !== 'pomodoro') return;
      const was = isRunning; pause(); stopAlarm();
      if (!isBreak) sessions++; isBreak = !isBreak; remaining = totalTime();
      updateMode(); updateSessionDots(); snapProgress();
      requestAnimationFrame(() => requestAnimationFrame(() => { updateDisplay(); if (was) start(); }));
    }

    function adjustDur(delta) {
      if (isRunning || appMode !== 'pomodoro') return;
      focusDur = Math.max(60, Math.min(3600, focusDur + delta * 5 * 60));
      if (!isBreak) remaining = focusDur; updateDisplay();
    }

    // Mode Switching & Dialog
    function trySwitchMode(mode) {
      if (mode === appMode) return;
      const isDirty = isRunning || (appMode === 'pomodoro' && remaining !== totalTime()) ||
                      (appMode === 'custom' && customDur > 0 && remaining !== customDur) || (appMode === 'stopwatch' && swTime > 0);
      if (isDirty) {
        pendingMode = mode; els.scrim.classList.add('open'); els.dlg.classList.add('open');
      } else switchMode(mode);
    }

    function switchMode(mode) {
      pause(); appMode = mode;
      document.querySelectorAll('.mtbtn').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
      const show = (el, val) => el.style.display = val ? '' : 'none';
      show(els.modeChip, mode !== 'stopwatch'); show(els.sess, mode === 'pomodoro'); show(els.durRow, mode === 'pomodoro');
      show(els.swAnim, mode === 'stopwatch'); show(els.hint, mode === 'custom'); show(document.getElementById('skip-btn'), mode === 'pomodoro');
      els.timer.classList.toggle('clickable', mode === 'custom'); els.modeChip.classList.toggle('editable', mode === 'custom');

      if (mode === 'pomodoro') { remaining = totalTime(); updateMode(); }
      else if (mode === 'custom') { updateMode(); remaining = customDur; }
      else if (mode === 'stopwatch') swTime = 0;
      
      snapProgress(); updateDisplay();
    }

    // Keypad Logic
    function openKeypad() {
      if (isRunning) return;
      keypadVal = ""; els.keypadDisp.textContent = "00h 00m 00s";
      els.keypadSheet.classList.add('open'); els.scrim.classList.add('open');
    }
    
    document.querySelectorAll('.kbtn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.id === 'kbtn-back') keypadVal = keypadVal.slice(0, -1);
        else if (keypadVal.length + btn.textContent.trim().length <= 6) keypadVal += btn.textContent.trim();
        const padded = keypadVal.padStart(6, '0');
        els.keypadDisp.textContent = padded === "000000" ? "00h 00m 00s" : `${padded.slice(0,2)}h ${padded.slice(2,4)}m ${padded.slice(4,6)}s`;
        
        // Visual pop animation
        els.keypadDisp.classList.remove('pop');
        void els.keypadDisp.offsetWidth;
        els.keypadDisp.classList.add('pop');
      });
    });

    document.getElementById('keypad-start').addEventListener('click', () => {
      const p = keypadVal.padStart(6, '0');
      const secs = parseInt(p.slice(0,2),10)*3600 + parseInt(p.slice(2,4),10)*60 + parseInt(p.slice(4,6),10);
      if (secs > 0) { customDur = secs; remaining = customDur; closeSheets(); updateDisplay(); start(); }
    });

    els.timer.addEventListener('click', () => { if (appMode === 'custom') openKeypad(); });
    els.modeChip.addEventListener('click', () => {
      if (appMode === 'custom') {
        const name = prompt("Rename timer:", customName);
        if (name !== null) { customName = name.trim() || "Custom Timer"; updateMode(); }
      }
    });

    // Fullscreen Smart Fade
    function updateFSUI() {
      if (!document.fullscreenElement) return;
      document.body.classList.add('cv'); clearTimeout(cvTimer);
      if (isRunning) cvTimer = setTimeout(() => document.body.classList.remove('cv'), 4000);
    }
    document.getElementById('fs-btn').addEventListener('click', () => {
      (!document.fullscreenElement) ? document.documentElement.requestFullscreen() : document.exitFullscreen();
    });
    document.addEventListener('fullscreenchange', () => {
      const fs = !!document.fullscreenElement; document.body.classList.toggle('fs', fs);
      document.getElementById('fs-btn').querySelector('.material-symbols-rounded').textContent = fs ? 'fullscreen_exit' : 'fullscreen';
      if (!fs) document.body.classList.remove('cv'); else updateFSUI();
    });
    document.body.addEventListener('click', e => {
      if (psActive) { wakeUp(); return; }
      if (!document.fullscreenElement || e.target.closest('#controls,#top-bar,.bottom-sheet,.scrim,#warning-dialog')) return;
      updateFSUI();
    });

    // Theme & Palette Engine
    function hexToHSL(hex) {
      let r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
      const mx=Math.max(r,g,b), mn=Math.min(r,g,b); let h=0,s=0,l=(mx+mn)/2;
      if (mx!==mn){ const d=mx-mn; s=l>.5?d/(2-mx-mn):d/(mx+mn);
        switch(mx){ case r:h=((g-b)/d+(g<b?6:0))/6;break; case g:h=((b-r)/d+2)/6;break; case b:h=((r-g)/d+4)/6;break; }
      } return [Math.round(h*360), Math.round(s*100)];
    }

    function applyPalette(hex, dark) {
      const [h,s] = hexToHSL(hex); const el = document.documentElement; const set = (k,v) => el.style.setProperty(k,v);
      const sat = Math.min(s+8, 85);
      if (dark) {
        set('--p',`hsl(${h},${sat}%,78%)`); set('--op',`hsl(${h},${s}%,11%)`); set('--pc',`hsl(${h},${s}%,24%)`); set('--opc',`hsl(${h},${sat}%,90%)`);
        set('--bg',`hsl(${h},10%,6%)`); set('--obg',`hsl(${h},8%,88%)`); set('--sc',`hsl(${h},10%,9%)`); set('--sch',`hsl(${h},10%,14%)`);
        set('--sv',`hsl(${h},10%,17%)`); set('--osv',`hsl(${h},7%,70%)`); set('--olv',`hsl(${h},8%,25%)`); els.metaTheme.content = `hsl(${h},10%,6%)`;
      } else {
        set('--p',`hsl(${h},${s}%,32%)`); set('--op',`#ffffff`); set('--pc',`hsl(${h},${Math.min(s+22,90)}%,88%)`); set('--opc',`hsl(${h},${s}%,10%)`);
        set('--bg',`hsl(${h},18%,97%)`); set('--obg',`hsl(${h},10%,10%)`); set('--sc',`hsl(${h},15%,92%)`); set('--sch',`hsl(${h},15%,88%)`);
        set('--sv',`hsl(${h},14%,88%)`); set('--osv',`hsl(${h},8%,38%)`); set('--olv',`hsl(${h},10%,78%)`); els.metaTheme.content = `hsl(${h},18%,97%)`;
      }
      seedHex = hex; localStorage.setItem('seed', hex);
      document.querySelectorAll('.preset').forEach(p => p.classList.toggle('sel', p.dataset.hex === hex));
    }

    function updateTheme() {
      const dark = els.themeToggle.checked;
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      localStorage.setItem('theme', dark ? 'dark' : 'light'); applyPalette(seedHex, dark);
    }

    // Power Save Logic
    function wakeUp() {
      if (psActive) { document.body.classList.remove('ps-active'); psActive = false; }
    }
    function resetIdle() {
      wakeUp(); clearTimeout(psTimer);
      if (psEnabled) { psTimer = setTimeout(() => { psActive = true; document.body.classList.add('ps-active'); }, psMinutes * 60000); }
    }
    ['touchstart','mousemove','click'].forEach(e => document.addEventListener(e, resetIdle));

    els.psToggle.addEventListener('change', e => { psEnabled = e.target.checked; localStorage.setItem('psEnabled', psEnabled); resetIdle(); });
    els.psTime.addEventListener('input', e => { psMinutes = Math.max(1, parseInt(e.target.value)||5); localStorage.setItem('psMinutes', psMinutes); resetIdle(); });

    // Initialization & Setup
    PRESET_COLORS.forEach(({ hex }) => {
      const btn = document.createElement('button'); btn.className = 'preset'; btn.dataset.hex = hex; btn.style.background = hex;
      btn.addEventListener('click', () => applyPalette(hex, els.themeToggle.checked));
      document.getElementById('presets').appendChild(btn);
    });

    const closeSheets = () => {
      els.settingsSheet.classList.remove('open'); els.keypadSheet.classList.remove('open'); els.dlg.classList.remove('open'); els.scrim.classList.remove('open');
    };

    document.getElementById('fab').addEventListener('click', toggle);
    document.getElementById('reset-btn').addEventListener('click', reset);
    document.getElementById('skip-btn').addEventListener('click', skip);
    document.getElementById('dec-btn').addEventListener('click', () => adjustDur(-1));
    document.getElementById('inc-btn').addEventListener('click', () => adjustDur(1));
    document.getElementById('settings-btn').addEventListener('click', () => { els.settingsSheet.classList.add('open'); els.scrim.classList.add('open'); });
    els.scrim.addEventListener('click', closeSheets);
    document.getElementById('keypad-cancel').addEventListener('click', closeSheets);
    document.getElementById('stop-alarm-btn').addEventListener('click', stopAlarm);
    document.getElementById('dlg-cancel').addEventListener('click', closeSheets);
    document.getElementById('dlg-confirm').addEventListener('click', () => { closeSheets(); reset(); switchMode(pendingMode); });
    els.themeToggle.addEventListener('change', updateTheme);
    document.querySelectorAll('.mtbtn').forEach(btn => btn.addEventListener('click', e => trySwitchMode(e.currentTarget.dataset.mode)));

    // Ripple
    document.querySelectorAll('button:not(.mtbtn):not(#keypad-cancel):not(#keypad-start):not(.dialog-btn):not(.toggle-switch)').forEach(btn => {
      btn.addEventListener('click', e => {
        const rc = btn.getBoundingClientRect(), sz = Math.max(rc.width, rc.height) * 2;
        const rpl = document.createElement('span'); rpl.className = 'ripple';
        rpl.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-rc.left-sz/2}px;top:${e.clientY-rc.top-sz/2}px`;
        btn.appendChild(rpl); setTimeout(() => rpl.remove(), 600);
      });
    });

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) els.themeToggle.checked = savedTheme === 'dark';
    else els.themeToggle.checked = window.matchMedia('(prefers-color-scheme: dark)').matches;
    els.psToggle.checked = psEnabled; els.psTime.value = psMinutes;

    applyPalette(seedHex, els.themeToggle.checked); updateMode(); updateSessionDots(); updateDisplay(); resetIdle();
    document.addEventListener('click', () => { if (Notification.permission === 'default') Notification.requestPermission(); }, { once: true });
  </script>
</body>
</html>
