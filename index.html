<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Material Timer</title>
  <link rel="manifest" href="menifest.json">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Roboto+Mono:wght@300;400&display=swap">
  <style>
    /*
     * Material You dynamic color system
     * True wallpaper-based dynamic color requires a native Android app.
     * On the web: we respect prefers-color-scheme and generate a full M3
     * tonal palette from a user-chosen seed color (HSL approximation of HCT).
     */

    :root {
      --p:   #4c8346;
      --op:  #ffffff;
      --pc:  #cdf5be;
      --opc: #072100;
      --bg:  #f5faf0;
      --obg: #181d16;
      --sv:  #dde5d8;
      --osv: #414940;
      --ol:  #71796f;
      --olv: #c1c9bb;
      --sc:  #eaede5;
      --sch: #e4e8df;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --p:   hsl(120,40%,78%);
        --op:  hsl(120,40%,10%);
        --pc:  hsl(120,40%,24%);
        --opc: hsl(120,40%,90%);
        --bg:  hsl(120,10%,6%);
        --obg: hsl(120,8%,88%);
        --sv:  hsl(120,10%,17%);
        --osv: hsl(120,7%,70%);
        --ol:  hsl(120,7%,54%);
        --olv: hsl(120,8%,25%);
        --sc:  hsl(120,10%,10%);
        --sch: hsl(120,10%,13%);
      }
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--obg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background .35s, color .35s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      position: relative;
    }

    #progress {
      position: fixed;
      inset: auto 0 0;
      height: 0%;
      background: var(--pc);
      border-radius: 24px 24px 0 0;
      transition: height 1.05s linear, background .35s;
      z-index: 0;
    }

    #top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: flex-end;
      padding: 10px 8px;
      gap: 2px;
      z-index: 10;
      transition: opacity .3s;
    }

    #main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #mode-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-radius: 8px;
      background: var(--sv);
      color: var(--osv);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      margin-bottom: 18px;
      transition: background .35s, color .35s;
    }

    .mode-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--p);
      transition: background .35s;
      flex-shrink: 0;
    }
    .mode-dot.running { animation: pulse-dot 1.8s ease-in-out infinite; }

    @keyframes pulse-dot {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(1.6); }
    }

    #sessions {
      display: flex;
      gap: 10px;
      margin-bottom: 26px;
    }

    .sdot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--olv);
      transition: background .3s, transform .3s;
    }
    .sdot.done    { background: var(--p); }
    .sdot.current { background: var(--p); transform: scale(1.45); }

    #timer {
      font-family: 'Roboto Mono', monospace;
      font-weight: 300;
      font-size: clamp(4.5rem, 22vw, 9.5rem);
      line-height: 1;
      letter-spacing: -.03em;
      color: var(--obg);
      margin-bottom: 14px;
      transition: color .35s, font-size .45s ease;
    }
    body.fs #timer { font-size: clamp(7rem, 30vw, 15rem); }

    #dur-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 44px;
      transition: opacity .3s, transform .3s;
    }
    #dur-row.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-5px);
    }

    #dur-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--osv);
      min-width: 46px;
      text-align: center;
    }

    .dur-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--sv);
      color: var(--osv);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: filter .15s, background .35s, color .35s;
    }
    .dur-btn:hover { filter: brightness(.93); }
    .dur-btn .material-symbols-rounded { font-size: 18px; }

    #controls {
      display: flex;
      align-items: center;
      gap: 20px;
      transition: opacity .3s;
    }

    #fab {
      width: 80px; height: 80px;
      border-radius: 28px;
      border: none;
      background: var(--p);
      color: var(--op);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 3px 14px rgba(0,0,0,.18);
      transition: background .35s, box-shadow .35s, transform .15s;
    }
    #fab:active { transform: scale(.95); }
    #fab .material-symbols-rounded { font-size: 38px; }

    .ibtn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: none;
      background: var(--sv);
      color: var(--osv);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: filter .15s, background .35s, color .35s;
    }
    .ibtn:hover { filter: brightness(.93); }
    .ibtn .material-symbols-rounded { font-size: 22px; }

    .tbtn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      background: none;
      color: var(--osv);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: background .15s, color .35s;
    }
    .tbtn:hover { background: var(--sv); }
    .tbtn .material-symbols-rounded { font-size: 22px; }

    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      animation: ripple-out .55s ease-out forwards;
      pointer-events: none;
    }
    #fab .ripple                      { background: rgba(255,255,255,.22); }
    .ibtn .ripple,.dur-btn .ripple,
    .tbtn .ripple,.preset .ripple     { background: rgba(0,0,0,.08); }

    @keyframes ripple-out { to { transform:scale(4); opacity:0; } }

    /* Fullscreen: hide everything, tap to reveal for 3s */
    body.fs #top-bar,
    body.fs #controls,
    body.fs #dur-row,
    body.fs #mode-chip,
    body.fs #sessions    { opacity:0; pointer-events:none; }

    body.fs.cv #top-bar,
    body.fs.cv #controls,
    body.fs.cv #mode-chip,
    body.fs.cv #sessions { opacity:1; pointer-events:auto; }

    body.fs.cv #dur-row:not(.hidden) { opacity:1; pointer-events:auto; }

    /* Color bottom sheet */
    #sheet-scrim {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 98;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    #sheet-scrim.open { opacity:1; pointer-events:auto; }

    #color-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--sc);
      border-radius: 28px 28px 0 0;
      padding: 16px 24px 44px;
      z-index: 99;
      transform: translateY(100%);
      transition: transform .38s cubic-bezier(.34,1.08,.64,1), background .35s;
    }
    #color-sheet.open { transform: translateY(0); }

    #sheet-handle {
      width: 32px; height: 4px;
      background: var(--olv);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    #color-sheet h3 { font-size:15px; font-weight:500; color:var(--obg); margin-bottom:3px; }
    #color-sheet p  { font-size:12px; color:var(--osv); margin-bottom:20px; line-height:1.5; }

    #presets {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .preset {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .2s, border-color .2s;
      outline: none;
    }
    .preset:hover { transform: scale(1.1); }
    .preset.sel   { border-color: var(--obg); }

    #custom-row { display:flex; align-items:center; gap:12px; }
    #custom-row label { font-size:13px; color:var(--osv); }

    #seed {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 2px solid var(--olv);
      cursor: pointer;
      padding: 2px;
      background: none;
    }

    @keyframes timer-done {
      0%  { transform:scale(1); }
      25% { transform:scale(1.05); }
      65% { transform:scale(.97); }
      100%{ transform:scale(1); }
    }
    #timer.done { animation: timer-done .55s ease; }

    /* Plays silently while running to prevent iOS screen lock */
    #bgv { position:fixed; width:1px; height:1px; opacity:0; pointer-events:none; }
  </style>
</head>
<body>

  <div id="top-bar">
    <button class="tbtn" id="palette-btn" title="Theme color">
      <span class="material-symbols-rounded">palette</span>
    </button>
    <button class="tbtn" id="theme-btn" title="Toggle dark mode">
      <span class="material-symbols-rounded">dark_mode</span>
    </button>
    <button class="tbtn" id="fs-btn" title="Fullscreen">
      <span class="material-symbols-rounded">fullscreen</span>
    </button>
  </div>

  <div id="progress"></div>

  <div id="main">
    <div id="mode-chip">
      <span class="mode-dot" id="mode-dot"></span>
      <span id="mode-text">Focus</span>
    </div>

    <div id="sessions">
      <span class="sdot" data-i="0"></span>
      <span class="sdot" data-i="1"></span>
      <span class="sdot" data-i="2"></span>
      <span class="sdot" data-i="3"></span>
    </div>

    <div id="timer">25:00</div>

    <div id="dur-row">
      <button class="dur-btn" id="dec-btn">
        <span class="material-symbols-rounded">remove</span>
      </button>
      <span id="dur-label">25 min</span>
      <button class="dur-btn" id="inc-btn">
        <span class="material-symbols-rounded">add</span>
      </button>
    </div>

    <div id="controls">
      <button class="ibtn" id="reset-btn" title="Reset">
        <span class="material-symbols-rounded">replay</span>
      </button>
      <button id="fab" title="Play / Pause">
        <span class="material-symbols-rounded" id="fab-icon">play_arrow</span>
      </button>
      <button class="ibtn" id="skip-btn" title="Skip to next">
        <span class="material-symbols-rounded">skip_next</span>
      </button>
    </div>
  </div>

  <div id="sheet-scrim"></div>
  <div id="color-sheet">
    <div id="sheet-handle"></div>
    <h3>Theme color</h3>
    <p>Generates a full Material You palette from a seed color.<br>
       Wallpaper-based dynamic color is native Android only.</p>
    <div id="presets"></div>
    <div id="custom-row">
      <label for="seed">Custom</label>
      <input type="color" id="seed" value="#4c8346">
    </div>
  </div>

  <video id="bgv" loop muted playsinline>
    <source src="blank-0.2-sec.m4v" type="video/mp4">
  </video>

  <script>
    const FOCUS_DEFAULT = 25 * 60;
    const BREAK_SHORT   =  5 * 60;
    const BREAK_LONG    = 15 * 60;
    const LONG_EVERY    = 4;

    const PRESET_COLORS = [
      { hex: '#4c8346', name: 'Forest'  },
      { hex: '#1a6ca8', name: 'Ocean'   },
      { hex: '#b5264c', name: 'Rose'    },
      { hex: '#6750a4', name: 'Violet'  },
      { hex: '#b25e02', name: 'Amber'   },
      { hex: '#006b5f', name: 'Teal'    },
    ];

    let focusDur  = FOCUS_DEFAULT;
    let isRunning = false;
    let isBreak   = false;
    let sessions  = 0;
    let remaining = focusDur;
    let ticker    = null;
    let seedHex   = localStorage.getItem('seed') || '#4c8346';
    let cvTimer   = null;

    const timerEl    = document.getElementById('timer');
    const progressEl = document.getElementById('progress');
    const modeText   = document.getElementById('mode-text');
    const modeDot    = document.getElementById('mode-dot');
    const fabBtn     = document.getElementById('fab');
    const fabIcon    = document.getElementById('fab-icon');
    const resetBtn   = document.getElementById('reset-btn');
    const skipBtn    = document.getElementById('skip-btn');
    const decBtn     = document.getElementById('dec-btn');
    const incBtn     = document.getElementById('inc-btn');
    const durLabel   = document.getElementById('dur-label');
    const durRow     = document.getElementById('dur-row');
    const themeBtn   = document.getElementById('theme-btn');
    const fsBtn      = document.getElementById('fs-btn');
    const paletteBtn = document.getElementById('palette-btn');
    const colorSheet = document.getElementById('color-sheet');
    const sheetScrim = document.getElementById('sheet-scrim');
    const presetsEl  = document.getElementById('presets');
    const seedInput  = document.getElementById('seed');
    const bgVideo    = document.getElementById('bgv');

    const fmt = s =>
      `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

    function totalTime() {
      if (!isBreak) return focusDur;
      return sessions % LONG_EVERY === 0 ? BREAK_LONG : BREAK_SHORT;
    }

    function snapProgress() {
      progressEl.style.transition = 'none';
      progressEl.style.height = '0%';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        progressEl.style.transition = '';
      }));
    }

    function updateDisplay() {
      const t = fmt(remaining);
      timerEl.textContent = t;
      document.title = `${t} — Material Timer`;
      progressEl.style.height = `${((totalTime()-remaining)/totalTime())*100}%`;
      durLabel.textContent = `${focusDur/60} min`;
    }

    function updateMode() {
      modeText.textContent = !isBreak ? 'Focus'
        : sessions % LONG_EVERY === 0 ? 'Long Break' : 'Short Break';
    }

    function updateSessionDots() {
      const cur = sessions % LONG_EVERY;
      document.querySelectorAll('.sdot').forEach((d, i) => {
        d.classList.remove('done','current');
        if (i < cur)                    d.classList.add('done');
        else if (i === cur && !isBreak) d.classList.add('current');
      });
    }

    function start() {
      if (isRunning) return;
      isRunning = true;
      fabIcon.textContent = 'pause';
      modeDot.classList.add('running');
      durRow.classList.add('hidden');
      bgVideo.play().catch(() => {});

      ticker = setInterval(() => {
        remaining--;
        updateDisplay();

        if (remaining <= 0) {
          clearInterval(ticker);
          isRunning = false;
          fabIcon.textContent = 'play_arrow';
          modeDot.classList.remove('running');
          bgVideo.pause();
          durRow.classList.remove('hidden');

          timerEl.classList.add('done');
          setTimeout(() => timerEl.classList.remove('done'), 600);

          // isBreak is still the mode that JUST ended — message is correct
          if (Notification.permission === 'granted') {
            new Notification('Material Timer', {
              body: isBreak ? 'Break over. Time to focus.'
                            : 'Session complete! Take a break.',
            });
          }

          if (!isBreak) { sessions++; updateSessionDots(); }
          isBreak = !isBreak;
          remaining = totalTime();
          updateMode();
          snapProgress();
          requestAnimationFrame(() => requestAnimationFrame(() => updateDisplay()));
        }
      }, 1000);
    }

    function pause() {
      clearInterval(ticker);
      isRunning = false;
      fabIcon.textContent = 'play_arrow';
      modeDot.classList.remove('running');
      durRow.classList.remove('hidden');
      bgVideo.pause();
    }

    function toggle() { isRunning ? pause() : start(); }

    function reset() {
      pause();
      isBreak = false; sessions = 0; remaining = focusDur;
      updateMode(); updateSessionDots(); snapProgress();
      requestAnimationFrame(() => requestAnimationFrame(() => updateDisplay()));
    }

    function skip() {
      const was = isRunning;
      pause();
      if (!isBreak) sessions++;
      isBreak = !isBreak;
      remaining = totalTime();
      updateMode(); updateSessionDots(); snapProgress();
      requestAnimationFrame(() => requestAnimationFrame(() => {
        updateDisplay();
        if (was) start();
      }));
    }

    function adjustDur(delta) {
      if (isRunning) return;
      focusDur = Math.max(60, Math.min(3600, focusDur + delta * 5 * 60));
      if (!isBreak) remaining = focusDur;
      updateDisplay();
    }

    // Fullscreen
    function toggleFS() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    }

    document.addEventListener('fullscreenchange', () => {
      const fs = !!document.fullscreenElement;
      document.body.classList.toggle('fs', fs);
      fsBtn.querySelector('.material-symbols-rounded').textContent =
        fs ? 'fullscreen_exit' : 'fullscreen';
      if (!fs) document.body.classList.remove('cv');
    });

    document.body.addEventListener('click', e => {
      if (!document.body.classList.contains('fs')) return;
      if (document.body.classList.contains('cv') &&
          e.target.closest('#controls,#top-bar')) return;
      document.body.classList.add('cv');
      clearTimeout(cvTimer);
      cvTimer = setTimeout(() => document.body.classList.remove('cv'), 3000);
    });

    // Theme
    function isDark() {
      const t = document.documentElement.getAttribute('data-theme');
      if (t === 'dark')  return true;
      if (t === 'light') return false;
      return window.matchMedia('(prefers-color-scheme: dark)').matches;
    }

    function applyTheme(dark) {
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      localStorage.setItem('theme', dark ? 'dark' : 'light');
      themeBtn.querySelector('.material-symbols-rounded').textContent =
        dark ? 'light_mode' : 'dark_mode';
      applyPalette(seedHex, dark);
    }

    // M3 palette generation from seed (HSL approximation of HCT tonal palette)
    function hexToHSL(hex) {
      let r=parseInt(hex.slice(1,3),16)/255,
          g=parseInt(hex.slice(3,5),16)/255,
          b=parseInt(hex.slice(5,7),16)/255;
      const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
      let h=0,s=0,l=(mx+mn)/2;
      if (mx!==mn){
        const d=mx-mn;
        s=l>.5?d/(2-mx-mn):d/(mx+mn);
        switch(mx){
          case r:h=((g-b)/d+(g<b?6:0))/6;break;
          case g:h=((b-r)/d+2)/6;break;
          case b:h=((r-g)/d+4)/6;break;
        }
      }
      return [Math.round(h*360), Math.round(s*100)];
    }

    function applyPalette(hex, dark = isDark()) {
      const [h,s] = hexToHSL(hex);
      const el = document.documentElement;
      const set = (k,v) => el.style.setProperty(k,v);
      const sat = Math.min(s+8, 85);

      if (dark) {
        set('--p',  `hsl(${h},${sat}%,78%)`);
        set('--op', `hsl(${h},${s}%,11%)`);
        set('--pc', `hsl(${h},${s}%,24%)`);
        set('--opc',`hsl(${h},${sat}%,90%)`);
        set('--bg', `hsl(${h},10%,6%)`);
        set('--obg',`hsl(${h},8%,88%)`);
        set('--sv', `hsl(${h},10%,17%)`);
        set('--osv',`hsl(${h},7%,70%)`);
        set('--ol', `hsl(${h},7%,54%)`);
        set('--olv',`hsl(${h},8%,25%)`);
        set('--sc', `hsl(${h},10%,10%)`);
        set('--sch',`hsl(${h},10%,13%)`);
      } else {
        set('--p',  `hsl(${h},${s}%,32%)`);
        set('--op', `#ffffff`);
        set('--pc', `hsl(${h},${Math.min(s+22,90)}%,88%)`);
        set('--opc',`hsl(${h},${s}%,10%)`);
        set('--bg', `hsl(${h},18%,97%)`);
        set('--obg',`hsl(${h},10%,10%)`);
        set('--sv', `hsl(${h},14%,88%)`);
        set('--osv',`hsl(${h},8%,38%)`);
        set('--ol', `hsl(${h},8%,52%)`);
        set('--olv',`hsl(${h},10%,78%)`);
        set('--sc', `hsl(${h},12%,92%)`);
        set('--sch',`hsl(${h},12%,88%)`);
      }

      seedHex = hex;
      localStorage.setItem('seed', hex);
      seedInput.value = hex;
      document.querySelectorAll('.preset').forEach(p =>
        p.classList.toggle('sel', p.dataset.hex === hex));
    }

    // Color sheet
    function buildPresets() {
      PRESET_COLORS.forEach(({ hex, name }) => {
        const btn = document.createElement('button');
        btn.className = 'preset';
        btn.dataset.hex = hex;
        btn.style.background = hex;
        btn.title = name;
        btn.addEventListener('click', () => applyPalette(hex));
        presetsEl.appendChild(btn);
      });
    }

    const openSheet  = () => { colorSheet.classList.add('open'); sheetScrim.classList.add('open'); };
    const closeSheet = () => { colorSheet.classList.remove('open'); sheetScrim.classList.remove('open'); };

    // Ripple
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', e => {
        const rc = btn.getBoundingClientRect();
        const sz = Math.max(rc.width, rc.height) * 2;
        const rpl = document.createElement('span');
        rpl.className = 'ripple';
        rpl.style.cssText =
          `width:${sz}px;height:${sz}px;` +
          `left:${e.clientX-rc.left-sz/2}px;` +
          `top:${e.clientY-rc.top-sz/2}px`;
        btn.appendChild(rpl);
        setTimeout(() => rpl.remove(), 600);
      });
    });

    // Events
    fabBtn.addEventListener('click',     toggle);
    resetBtn.addEventListener('click',   reset);
    skipBtn.addEventListener('click',    skip);
    decBtn.addEventListener('click',     () => adjustDur(-1));
    incBtn.addEventListener('click',     () => adjustDur(1));
    themeBtn.addEventListener('click',   () => applyTheme(!isDark()));
    fsBtn.addEventListener('click',      toggleFS);
    paletteBtn.addEventListener('click', openSheet);
    sheetScrim.addEventListener('click', closeSheet);
    seedInput.addEventListener('input',  e => applyPalette(e.target.value));

    // Init
    buildPresets();
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      document.documentElement.setAttribute('data-theme', savedTheme);
      themeBtn.querySelector('.material-symbols-rounded').textContent =
        savedTheme === 'dark' ? 'light_mode' : 'dark_mode';
    }
    applyPalette(seedHex);
    updateMode();
    updateSessionDots();
    updateDisplay();

    // Ask for notification permission on first interaction, not on page load
    document.addEventListener('click', () => {
      if (Notification.permission === 'default') Notification.requestPermission();
    }, { once: true });
  </script>
</body>
</html>
